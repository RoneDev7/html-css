<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
        }

        table {
            width: 500px;
        }

        td, th {
            border: 1px solid black;
            padding: 10px;
        }

        thead, tfoot {
            background-color: darkgray;
            color: white;
        }

        td.num {
            text-align: right;
        }
    </style>
</head>
<body>
    <h1>
        Uso de tabelas grandes
    </h1>

    <!--
        ANATOMIA PARA TABELAS GRANDES
        TABLE
            THEAD
                tr, td, th
            TBODY
                tr, td, th
            TFOOT
                tr, td, th
    -->

    <table>
        <thead>
            <tr>
                <th>Estado</th>
                <th>População</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Bahia</td>
                <td class="num">14 870 907</td>
            </tr>

            <tr>
                <td>Pernambuco</td>
                <td class="num">9 562 007	</td>
            </tr>

            <tr>
                <td>Ceará</td>
                <td class="num">9 268 836</td>
            </tr>

            <tr>
                <td>Maranhão</td>
                <td class="num">7 018 211</td>
            </tr>

            <tr>
                <td>Paraíba</td>
                <td class="num">4 164 468</td>
            </tr>
            
             <tr>
                <td>Rio Grande do Norte</td>
                <td class="num">3 455 236</td>
            </tr>

            <tr>
                <td>Piauí</td>
                <td class="num">3 384 547</td>
            </tr>

            <tr>
                <td>Alagoas</td>
                <td class="num">3 220 848</td>
            </tr>

            <tr>
                <td>Sergipe</td>
                <td class="num">2 299 425</td>  
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th>Total de habitantes</th>
                <td class="num">57 244 485</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
